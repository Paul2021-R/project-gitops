apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: ghcr.io/paul2021-r/project-protostar-nest
    newTag: "latest"

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: protostar-nest
        namespace: service
        labels:
          env: prod
      spec:
        replicas: 1
        template:
          metadata:
            labels:
              env: prod
          spec:
            nodeSelector:
              kubernetes.io/hostname: hansol-a5
            containers:
              - name: protostar-nest
                resources: 
                  limits:
                    memory: "512Mi"
                    cpu: "1000m"
                  requests:
                    memory: "256Mi"
                    cpu: "500m"
                livenessProbe:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 20
                readinessProbe:
                  httpGet: 
                    path: /
                    port: 3000
                  initialDelaySeconds: 20
                  periodSeconds: 10
                