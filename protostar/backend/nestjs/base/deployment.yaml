apiVersion: apps/v1
kind: Deployment
metadata:
  name: protostar-nest
  namespace: service
  labels:
    app: protostar
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: protostar
      tier: backend
  template:
    metadata:
      labels:
        app: protostar
        tier: backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: protostar-nest
          image: ghcr.io/paul2021-r/project-protostar-nest:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
               name: protostar-nest-config
            - secretRef:
               name: protostar-nest-secret